name: Publish ai-hist binary packages

# Builds the `ai-hist` Rust binary for each target and publishes it as a
# per-platform npm package (`ai-hist-bin-<platform>-<arch>`). These are the
# optional dependencies agent-relay installs so Reflex capture works with no
# extra setup. Publish the matching version right after the SDK
# (`publish.yml`) so ai-hist + ai-hist-bin-* stay in lockstep.
#
# Uses npm's OIDC trusted-publisher flow (no NPM_TOKEN). Each package name must
# be registered as a trusted publisher for this repo+workflow on npmjs before
# its first publish — see docs/reflex-zero-setup.md.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (should match the ai-hist SDK, e.g. 0.4.0)'
        required: true
      tag:
        description: 'npm dist-tag'
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta
      dry_run:
        description: 'Dry run (build + pack, no publish)'
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish ${{ matrix.pkg }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            pkg: ai-hist-bin-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            pkg: ai-hist-bin-darwin-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            pkg: ai-hist-bin-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            pkg: ai-hist-bin-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ai-hist-bin-${{ matrix.target }}
          cache-bin: false

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-musl'
        uses: taiki-e/install-action@cross

      - name: Build binary
        run: |
          set -euo pipefail
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            RUSTFLAGS="-C target-feature=+crt-static" cross build --release --target "${{ matrix.target }}" -p ai-hist-cli
          else
            RUSTFLAGS="-C target-feature=+crt-static" cargo build --release --target "${{ matrix.target }}" -p ai-hist-cli
          fi
          strip "target/${{ matrix.target }}/release/ai-hist" 2>/dev/null || true

      - name: Stage binary into the package
        run: |
          set -euo pipefail
          DIR="bin-packages/${{ matrix.pkg }}"
          mkdir -p "$DIR/bin"
          cp "target/${{ matrix.target }}/release/ai-hist" "$DIR/bin/ai-hist"
          chmod 755 "$DIR/bin/ai-hist"

      - uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      - name: Set version
        working-directory: bin-packages/${{ matrix.pkg }}
        run: npm version "${{ github.event.inputs.version }}" --no-git-tag-version --allow-same-version

      - name: Check if already published
        id: check
        working-directory: bin-packages/${{ matrix.pkg }}
        run: |
          set -euo pipefail
          V="${{ github.event.inputs.version }}"
          if npm view "${{ matrix.pkg }}@$V" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ matrix.pkg }}@$V is already published — skipping."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.already == 'false'
        working-directory: bin-packages/${{ matrix.pkg }}
        run: |
          set -euo pipefail
          FLAGS=(--access public --tag "${{ github.event.inputs.tag }}")
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "==> npm publish --dry-run ${FLAGS[*]}"
            npm publish --dry-run "${FLAGS[@]}"
          else
            # `--provenance` uses the OIDC token from `id-token: write`.
            FLAGS+=(--provenance)
            echo "==> npm publish ${FLAGS[*]}"
            npm publish "${FLAGS[@]}"
          fi
