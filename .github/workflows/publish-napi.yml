name: Publish ai-hist-native (napi)

# Builds the `ai-hist-native` napi addon for each platform and publishes it —
# the main `ai-hist-native` package (JS loader) plus one
# `ai-hist-native-<platform>-<arch>` package per target carrying the `.node`.
# agent-relay depends on `ai-hist-native` (optional) and calls `syncAndPush()`
# in-process. See docs/reflex-zero-setup.md.
#
# NOTE: napi cross-compilation (esp. the musl targets) can need tuning per
# runner image; validate a dry run before the first real publish.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no publish)'
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

defaults:
  run:
    working-directory: crates/ai-hist-napi

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ai-hist-napi-${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install deps
        run: npm ci

      - name: Build addon
        run: |
          set -euo pipefail
          # zig simplifies the aarch64 musl cross-compile.
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            npx napi build --platform --release --target "${{ matrix.target }}" --zig
          else
            npx napi build --platform --release --target "${{ matrix.target }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: napi-${{ matrix.target }}
          path: crates/ai-hist-napi/*.node
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
      - name: Install deps
        run: npm ci
      - uses: actions/download-artifact@v4
        with:
          path: crates/ai-hist-napi/artifacts
      - name: Assemble per-platform packages
        run: npx napi create-npm-dirs && npx napi artifacts --dir artifacts
      - name: Publish
        run: |
          set -euo pipefail
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "Dry run — skipping publish. Prepared packages:"
            npx napi prepublish -t npm --dry-run || true
          else
            # Publishes the per-platform packages then the main package (OIDC provenance).
            npx napi prepublish -t npm --provenance
          fi
